language: "ru-RU"
reviews:
  profile: "assertive"
instructions: |
  Ты — техлид Azachess. Внедряем логику "Авторизация перед стартом".
  
  ЛОГИКА ГЛАВНОЙ СТРАНИЦЫ (index.html):
  1. Кнопки "ИГРАТЬ" и "АНАЛИЗ" ВСЕГДА видны гостю. 
  2. Если гость нажимает на них, но в localStorage отсутствует `azachess-user-id`, его ДОЛЖНО перекинуть на auth.html.
  3. Настройки времени и уровня ИИ должны сохраняться в localStorage даже у гостя, чтобы после регистрации они не сбросились.

  ЗАЩИТА СТРАНИЦ (app.js и analysis-app.js):
  1. Если пользователь попал на эти страницы без ID в localStorage, немедленный редирект на auth.html.
  2. Удали все проверки `if (userId)` внутри функций сохранения — теперь на этих страницах могут быть только авторизованные игроки.
