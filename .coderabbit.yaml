language: "ru-RU"
reviews:
  profile: "assertive"
instructions: |
  Ты — техлид Azachess. У нас критическая проблема: гостевые партии продолжают сохраняться в архив.
  
  СТРОГИЕ ПРАВИЛА ПРОВЕРКИ:
  1. Проверка авторизации: `userId` должен проверяться максимально строго. Если `!userId` ИЛИ `userId === "null"` ИЛИ `userId === "undefined"`, сохранение должно БЛОКИРОВАТЬСЯ.
  2. Локальный архив: Запись в `localStorage.setItem('azachess-archive', ...)` должна находиться ВНУТРИ блока, который выполняется ТОЛЬКО для авторизованных пользователей.
  3. Очистка при выходе: В index.html функция выхода должна не только удалять ключи, но и очищать переменную `userId` в текущем контексте.
  4. Проверь функцию `saveGameState`: она не должна записывать данные в архивный ключ `azachess-archive`.
