language: "ru-RU"
reviews:
  profile: "assertive"
  request_changes_workflow: true
instructions: |
  Ты — ведущий инженер Azachess. Теперь в проекте есть Firebase Auth.
  
  НОВЫЕ ПРАВИЛА АВТОРИЗАЦИИ:
  1. Признак входа: Если в localStorage есть `azachess-user-id`, пользователь авторизован.
  2. Гостевой режим: Если `userId` отсутствует, функция `saveToPermanentArchive` НЕ должна ничего сохранять. Это не ошибка, а требование.
  3. Безопасность данных: При выходе (logout) обязательно очищать `azachess-archive` и `azachess-save-game` из localStorage.
  
  АРХИТЕКТУРА:
  - Система "Живого времени": Сохранение `lastTick` каждую секунду обязательно.
  - Синхронизация: Следи, чтобы при загрузке из Firebase или localStorage доска всегда соответствовала последнему ходу (currentMoveIndex).
  
  ТВОЯ ЗАДАЧА:
  - Проверяй, чтобы функции сохранения не работали для "гостей".
  - Требуй детальные логи в консоль для всех ошибок Firebase.
