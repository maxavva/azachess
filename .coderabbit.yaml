language: "ru-RU"
reviews:
  profile: "assertive"
instructions: |
  Ты — техлид Azachess. Мы меняем логику главной страницы (index.html).
  
  НОВЫЕ ПРАВИЛА ИНТЕРФЕЙСА:
  1. ДЛЯ ГОСТЕЙ (user == null):
     - Кнопки "ИГРАТЬ", "АНАЛИЗ" и "АРХИВ" должны быть СКРЫТЫ.
     - Вместо них должна отображаться одна большая кнопка "ВОЙТИ, ЧТОБЫ НАЧАТЬ", ведущая на auth.html.
  2. ДЛЯ АВТОРИЗОВАННЫХ (user != null):
     - Скрываем кнопку "ВОЙТИ, ЧТОБЫ НАЧАТЬ".
     - Показываем стандартную панель управления (ИГРАТЬ, АНАЛИЗ, АРХИВ).
  3. РЕДИРЕКТЫ:
     - Если гость вручную введет адрес play.html или analysis.html, скрипт в этих файлах должен проверить localStorage['azachess-user-id'] и, если его нет, выкинуть пользователя на auth.html.
