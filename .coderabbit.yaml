language: "ru-RU"
reviews:
  profile: "assertive"
instructions: |
  Ты — техлид Azachess. Мы ПОЛНОСТЬЮ ОТКАЗАЛИСЬ от гостевого режима.
  
  НОВЫЕ ПРАВИЛА (Auth Only):
  1. Доступ к игре: В `app.js` (функция initApp), если в localStorage отсутствует `azachess-user-id`, скрипт должен немедленно делать редирект: `window.location.href = "auth.html"`.
  2. Главная страница: В `index.html`, если пользователь не вошел, кнопка "ИГРАТЬ" должна быть заблокирована (disabled) или перенаправлять на страницу входа.
  3. Упрощение кода: Теперь в функциях сохранения (`saveGameState`, `saveToPermanentArchive`) проверка на `userId` НЕ НУЖНА, так как неавторизованный пользователь физически не может попасть на страницу игры.
  4. Удаление мусора: Очисти код от всех логов типа "Гостевой режим, архив пропущен".
