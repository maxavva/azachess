<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Azachess - Игра против ИИ</title>
  <link rel="stylesheet" href="style.css">
  <!-- Библиотека шахмат (глобальная) -->
<script src="https://cdn.jsdelivr.net/npm/chess.js@0.10.3/chess.min.js"></script>

<!-- Звуки (обычный скрипт) -->
<script src="sounds.js"></script>

<!-- Твой код (ОБЯЗАТЕЛЬНО type="module") -->
<script type="module" src="app.js"></script>
<body>

  <div class="game-wrapper-root">
    <div class="nav-bar">
      <a href="index.html" class="nav-link">← На главную</a>
      <button id="btn-settings-open" class="nav-link" style="background: none; border: none; cursor: pointer; font-family: inherit;">⚙ Настройки</button>
    </div>

    <div class="game-container">
      <div class="board-wrapper">
        <div id="board" class="chessboard"></div>
        <div class="navigation-controls">
          <button id="btn-nav-first" class="btn btn-secondary nav-btn">|&lt;</button>
          <button id="btn-nav-prev" class="btn btn-secondary nav-btn">&lt;</button>
          <button id="btn-nav-next" class="btn btn-secondary nav-btn">&gt;</button>
          <button id="btn-nav-last" class="btn btn-secondary nav-btn">&gt;|</button>
        </div>
        
       <!-- Модалка настроек -->
        <div id="settings-modal" class="modal hidden">
          <div class="modal-content" style="text-align: left; max-width: 380px; width: 90%;">
            <h3 style="text-align: center; margin-bottom: 20px; color: var(--text-bright);">Настройки</h3>
            
            <div class="setting-row">
              <label for="opt-sound">Звуковое сопровождение</label>
              <input type="checkbox" id="opt-sound" checked>
            </div>
            
            <div class="setting-row">
              <label for="opt-hints">Точки-подсказки ходов</label>
              <input type="checkbox" id="opt-hints" checked>
            </div>
            
            <div class="setting-row">
              <label for="opt-coords">Координаты на доске</label>
              <input type="checkbox" id="opt-coords" checked>
            </div>
            
            <div class="setting-row">
              <label for="opt-theme">Тема оформления</label>
              <select id="opt-theme">
                <option value="emerald">Изумрудная (Зеленая)</option>
                <option value="classic">Классическая (Дерево)</option>
                <option value="blue">Голубая</option>
                <option value="charcoal">Графит (Темная)</option>
              </select>
            </div>
            
            <button id="btn-settings-close" class="btn" style="width: 100%; margin-top: 15px;">Сохранить и закрыть</button>
          </div>
        </div>

      <div class="control-panel">
        <!-- ТУТ БЫЛА ОШИБКА В ТЕКСТЕ -->
        <div class="status-display" id="status-text">Подготовка партии...</div>

        <div id="clocks-wrapper" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px;">
          <div id="clock-top" class="clock">--:--</div>
          <div id="clock-bottom" class="clock">--:--</div>
        </div>

        <div class="move-history">
          <div class="history-title">История ходов</div>
          <div id="move-log" class="move-log-content"></div>
        </div>

        <div class="actions">
          <button id="btn-new-game" class="btn">Новая игра</button>
          <button id="btn-flip" class="btn btn-secondary">Повернуть доску</button>
        </div>
      </div>
    </div>
  </div>


</body>
</html>
