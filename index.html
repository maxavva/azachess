<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Azachess — Главная</title>
  <link rel="stylesheet" href="home-style.css">
</head>
<body>

<div id="user-bar" style="background: rgba(0,0,0,0.3); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c3934;">
  <div id="user-info" style="color: white; font-weight: bold;">Загрузка...</div>
  <div id="auth-links">
    <a href="auth.html" id="login-link" class="nav-link" style="font-size: 0.8rem;">Войти</a>
    <button id="logout-btn" class="nav-link" style="display: none; background: none; border: none; font-size: 0.8rem; cursor: pointer; color: #d9534f;">Выйти</button>
  </div>
</div>

<script>
  // Простая проверка: есть ли ID пользователя в памяти
  function checkAuth() {
    const uid = localStorage.getItem('azachess-user-id');
    // Если значения нет, или оно равно "null" (строкой), возвращаем false
    return (uid && uid !== "null" && uid !== "undefined");
  }

  // Функция для кнопки ИГРАТЬ
  function startGame() {
    if (!checkAuth()) {
      window.location.href = 'auth.html'; // Отправляем на регистрацию
      return;
    }
    // Если авторизован — удаляем старую игру и идем играть
    localStorage.removeItem('azachess-save-game');
    window.location.href = 'play.html';
  }

  // Функция для кнопки АНАЛИЗ
  function openAnalysis() {
    if (!checkAuth()) {
      window.location.href = 'auth.html'; // Отправляем на регистрацию
      return;
    }
    window.location.href = 'analysis.html';
  }

  // Инициализация сеток выбора (время, уровень, цвет)
  function initGrid(selector, storageKey) {
    document.querySelectorAll(selector).forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll(selector).forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        localStorage.setItem(storageKey, el.dataset.time || el.dataset.lv || el.dataset.color);
      });
    });
  }

  // Запуск выбора при загрузке
  initGrid('#time-grid .time-card', 'selected-time-control');
  initGrid('#level-grid .level-btn', 'selected-ai-level');
  initGrid('#color-grid .level-btn', 'selected-player-color');

  // Установка значений по умолчанию, если их нет
  if(!localStorage.getItem('selected-time-control')) localStorage.setItem('selected-time-control', '5+3');
  if(!localStorage.getItem('selected-ai-level')) localStorage.setItem('selected-ai-level', '3');
  if(!localStorage.getItem('selected-player-color')) localStorage.setItem('selected-player-color', 'w');
</script>

</body>
</html>
