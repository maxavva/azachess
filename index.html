<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Azachess — Главная</title>
  <!-- ВАЖНО: ПРОВЕРЬ ЭТУ ССЫЛКУ -->
  <link rel="stylesheet" href="home-style.css">
</head>
<body>

  <div class="hub-container">
    <header class="hub-header">
      <h1 class="logo">AZA<span>CHESS</span></h1>
      <p class="tagline">Начни свою партию</p>
    </header>

    <main class="hub-content">
      <section class="mode-section">
        <h2 class="section-title">1. Выберите время</h2>
        <div class="time-grid" id="time-grid">
          <div class="time-card" data-time="1+0"><span class="val">1+0</span><span class="lab">Пуля</span></div>
          <div class="time-card" data-time="3+2"><span class="val">3+2</span><span class="lab">Блиц</span></div>
          <div class="time-card active" data-time="5+3"><span class="val">5+3</span><span class="lab">Блиц</span></div>
          <div class="time-card" data-time="10+5"><span class="val">10+5</span><span class="lab">Рапид</span></div>
          <div class="time-card" data-time="30+0"><span class="val">30+0</span><span class="lab">Классика</span></div>
          <div class="time-card special" data-time="none"><span class="val">∞</span><span class="lab">Без времени</span></div>
        </div>
      </section>

      <section class="mode-section">
        <h2 class="section-title">2. Выберите уровень ИИ</h2>
        <div class="level-grid" id="level-grid">
          <button class="level-btn" data-lv="1">1</button>
          <button class="level-btn" data-lv="2">2</button>
          <button class="level-btn active" data-lv="3">3</button>
          <button class="level-btn" data-lv="4">4</button>
          <button class="level-btn" data-lv="5">5</button>
          <button class="level-btn" data-lv="6">6</button>
          <button class="level-btn" data-lv="7">7</button>
          <button class="level-btn" data-lv="8">8</button>
        </div>
      </section>

      <section class="mode-section">
  <h2 class="section-title">3. Выберите цвет</h2>
  <div class="level-grid" id="color-grid" style="grid-template-columns: repeat(3, 1fr);">
    <button class="level-btn active" data-color="w">Белые</button>
    <button class="level-btn" data-color="random">?</button>
    <button class="level-btn" data-color="b">Черные</button>
  </div>
</section>
     
      <div class="main-actions">
        <button class="start-btn" onclick="startGame()">ИГРАТЬ</button>
        <a href="analysis.html" class="start-btn secondary">АНАЛИЗ</a>
      </div>
    </main>

    <footer class="hub-footer">
      <p>&copy; 2026 Azachess Project</p>
    </footer>
  </div>

  <script>
    if(!localStorage.getItem('selected-time-control')) localStorage.setItem('selected-time-control', '5+3');
    if(!localStorage.getItem('selected-ai-level')) localStorage.setItem('selected-ai-level', '3');

    document.querySelectorAll('#time-grid .time-card').forEach(card => {
      card.onclick = () => {
        document.querySelectorAll('#time-grid .time-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        localStorage.setItem('selected-time-control', card.dataset.time);
      };
    });

    document.querySelectorAll('#level-grid .level-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#level-grid .level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        localStorage.setItem('selected-ai-level', btn.dataset.lv);
      };
    });

    function startGame() {
      window.location.href = 'play.html';
    }
  
  function startGame() {
  // Убеждаемся, что уровень ИИ записан
  const activeLevel = document.querySelector('#level-grid .level-btn.active');
  if (activeLevel) {
      localStorage.setItem('selected-ai-level', activeLevel.dataset.lv);
  }
  window.location.href = 'play.html';
}
  
  </script>
</body>
</html>
