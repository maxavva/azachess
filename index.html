<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Azachess — Главная</title>
  <link rel="stylesheet" href="home-style.css">
</head>
<body>

  <div class="top-profile-bar">
    <div id="user-info" style="font-weight: bold; color: #fff;">👣 Загрузка...</div>
    <div id="auth-controls"></div>
  </div>

  <div class="hub-container">
    <h1 class="logo">AZA<span>CHESS</span></h1>
    <p class="tagline">игровая шахматная платформа</p>

    <main>
      <!-- КОНТРОЛЬ ВРЕМЕНИ -->
      <section class="mode-section">
        <h2 class="section-title">Контроль времени</h2>
        <div class="selection-grid" id="time-grid">
          <div class="grid-item" data-time="1+0">1+0 <span class="label">Пуля</span></div>
          <div class="grid-item" data-time="3+2">3+2 <span class="label">Блиц</span></div>
          <div class="grid-item active" data-time="5+3">5+3 <span class="label">Блиц</span></div>
          <div class="grid-item" data-time="10+5">10+5 <span class="label">Рапид</span></div>
          <div class="grid-item" data-time="30+0">30+0 <span class="label">Классика</span></div>
          <div class="grid-item" data-time="none">∞ <span class="label">Без времени</span></div>
        </div>
      </section>

      <!-- УРОВНИ ИИ -->
      <section class="mode-section">
        <h2 class="section-title">Сложность ИИ</h2>
        <div class="selection-grid" id="level-grid" style="grid-template-columns: repeat(4, 1fr);">
          <div class="grid-item" data-lv="1">1</div>
          <div class="grid-item" data-lv="2">2</div>
          <div class="grid-item active" data-lv="3">3</div>
          <div class="grid-item" data-lv="4">4</div>
          <div class="grid-item" data-lv="5">5</div>
          <div class="grid-item" data-lv="6">6</div>
          <div class="grid-item" data-lv="7">7</div>
          <div class="grid-item" data-lv="8">8</div>
        </div>
      </section>

      <!-- ЦВЕТ -->
      <section class="mode-section">
        <h2 class="section-title">Выберите цвет</h2>
        <div class="selection-grid" id="color-grid">
          <div class="grid-item active" data-color="w">Белые</div>
          <div class="grid-item" data-color="random">Случайный</div>
          <div class="grid-item" data-color="b">Черные</div>
        </div>
      </section>
     
      <div class="main-actions" id="action-container">
        <button class="start-btn" id="btn-play-main" onclick="startGame()">Игра против ИИ</button>
        <button class="start-btn" style="background: #2b5c8f; box-shadow: 0 4px 0px #1a3a5e;" onclick="startMultiplayer()">Играть онлайн (PvP)</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
            <button class="start-btn secondary" onclick="openAnalysis()">Доска для анализа</button>
            <button class="start-btn secondary" onclick="location.href='archive.html'">История игр</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged, signOut, doc, getDoc } from "./firebase-logic.js";

    // Отслеживание авторизации с обработкой ошибок сети
    onAuthStateChanged(auth, async (user) => {
      const info = document.getElementById('user-info');
      const ctrls = document.getElementById('auth-controls');
      if (user) {
        localStorage.setItem('azachess-user-id', user.uid);
        
        let username = "Игрок";
        try {
          const snap = await getDoc(doc(db, "users", user.uid));
          if (snap.exists() && snap.data().username) {
            username = snap.data().username;
          }
        } catch (err) {
          console.warn("Сбой получения профиля, переход в локальный режим:", err);
          username = "Игрок (офлайн)";
        }

        info.innerText = "👤 " + username;
        ctrls.innerHTML = `
          <a href="settings.html" class="grid-item" style="padding: 5px 15px; font-size: 0.8rem; text-decoration: none; margin-right: 8px;">⚙ Настройки</a>
          <button id="l-btn" class="grid-item" style="padding: 5px 15px; font-size: 0.8rem; color: #d9534f; border-color: #d9534f; background: none;">Выйти</button>
        `;
        document.getElementById('l-btn').onclick = window.logout;
      } else {
        localStorage.removeItem('azachess-user-id');
        info.innerText = "👣 Гость";
        ctrls.innerHTML = `
          <a href="settings.html" class="grid-item" style="padding: 5px 15px; font-size: 0.8rem; text-decoration: none; margin-right: 8px;">⚙ Настройки</a>
          <a href="auth.html" class="grid-item" style="padding: 5px 15px; font-size: 0.8rem; text-decoration: none;">Войти</a>
        `;
      }
    });

    window.logout = () => { 
        if(confirm("Выйти?")) { 
            signOut(auth).then(() => { 
                localStorage.clear(); 
                location.reload(); 
            }); 
        } 
    };

    // Настройка кликов по кнопкам времени/уровня/цвета
    function setup(id, key) {
        document.querySelectorAll(`#${id} .grid-item`).forEach(el => {
            el.onclick = () => {
                document.querySelectorAll(`#${id} .grid-item`).forEach(i => i.classList.remove('active'));
                el.classList.add('active');
                localStorage.setItem(key, el.dataset.time || el.dataset.lv || el.dataset.color);
            };
        });
    }
    setup('time-grid', 'selected-time-control');
    setup('level-grid', 'selected-ai-level');
    setup('color-grid', 'selected-player-color');

    // Навигация
    window.startGame = () => {
        if (!localStorage.getItem('azachess-user-id')) { window.location.href = 'auth.html'; return; }
        window.location.href = 'play.html';
    };

    window.startMultiplayer = () => {
        if (!localStorage.getItem('azachess-user-id')) { window.location.href = 'auth.html'; return; }
        window.location.href = 'multiplayer.html';
    };

    window.openAnalysis = () => {
        if (!localStorage.getItem('azachess-user-id')) { window.location.href = 'auth.html'; return; }
        window.location.href = 'analysis.html';
    };

    // Динамическая кнопка "Продолжить партию"
    document.addEventListener('DOMContentLoaded', () => {
        const playBtn = document.getElementById('btn-play-main');
        if (playBtn) {
            const hasSave = localStorage.getItem('azachess-save-game');
            if (hasSave) {
                playBtn.innerText = "Продолжить партию";
                
                if (!document.getElementById('btn-new-game-main')) {
                    const newGameBtn = document.createElement('button');
                    newGameBtn.id = 'btn-new-game-main';
                    newGameBtn.className = 'start-btn secondary';
                    newGameBtn.innerText = "Новая игра";
                    newGameBtn.style.marginTop = "10px";
                    newGameBtn.onclick = () => {
                        if (confirm("Начать новую игру? Текущая партия будет безвозвратно удалена.")) {
                            localStorage.removeItem('azachess-save-game');
                            window.location.href = 'play.html';
                        }
                    };
                    playBtn.parentNode.insertBefore(newGameBtn, playBtn.nextSibling);
                }
            }
        }
    });
  </script>
</body>
</html>
