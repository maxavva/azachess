<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Azachess - История игр</title>
  <link rel="stylesheet" href="home-style.css">
  <style>
    .game-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .game-info { flex-grow: 1; min-width: 0; }
    .game-moves { color: #666; font-size: 0.8rem; margin-top: 10px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loader { text-align: center; padding: 40px; font-weight: bold; color: var(--accent); }
  </style>
</head>
<body>
  <div class="top-profile-bar">
    <a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">← НА ГЛАВНУЮ</a>
    <div style="font-weight: bold; color: #fff;">История игр</div>
  </div>

  <div class="hub-container" style="max-width: 800px;">
    <div id="loader" class="loader">Получение партий из облака...</div>
    <main id="archive-list"></main>
  </div>

 <script type="module">
    import { db, collection, query, getDocs } from "./firebase-logic.js";

    async function loadGames() {
        const userId = localStorage.getItem('azachess-user-id');
        const list = document.getElementById('archive-list');
        const loader = document.getElementById('loader');

        if (!userId) {
            list.innerHTML = '<div style="text-align:center; padding: 20px;">Войдите в аккаунт.</div>';
            loader.style.display = 'none';
            return;
        }

        try {
            // МЕНЯЕМ ПУТЬ ЗАПРОСА: заходим в личный контейнер
            const userHistoryRef = collection(db, "users", userId, "history");
            const querySnapshot = await getDocs(userHistoryRef);
            
            loader.style.display = 'none';

            if (querySnapshot.empty) {
                list.innerHTML = '<div style="text-align:center; padding: 20px;">Ваш контейнер пуст. Сыграйте партию!</div>';
                return;
            }

            // Сортируем локально по дате (самые свежие сверху)
            const sortedDocs = querySnapshot.docs.sort((a, b) => b.data().id - a.data().id);

            list.innerHTML = sortedDocs.map(doc => {
                const game = doc.data();
                return `
                    <div class="game-card">
                        <div class="game-info">
                            <div style="font-size: 0.75rem; color: #888;">${game.date}</div>
                            <div style="font-size: 1.1rem; font-weight: bold; color: #fff; margin: 4px 0;">${game.result}</div>
                            <div class="game-meta">Уровень ${game.aiLevel} • ${game.timeControl}</div>
                            <div class="game-moves">${game.history.map(m => m.san).join(' ')}</div>
                        </div>
                        <button class="grid-item" style="padding: 10px 15px;" onclick="viewGame('${doc.id}')">АНАЛИЗ</button>
                    </div>
                `;
            }).join('');

            window.viewGame = (docId) => {
                const found = sortedDocs.find(d => d.id === docId);
                if (found) {
                    sessionStorage.setItem('analysis-load-game', JSON.stringify(found.data().history));
                    window.location.href = 'analysis.html';
                }
            };

        } catch (e) {
            console.error("Firebase Error:", e);
            loader.innerText = "Ошибка доступа к контейнеру.";
        }
    }
    loadGames();
</script>
</body>
</html>
