<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Azachess - Личный Архив</title>
  <link rel="stylesheet" href="home-style.css">
  <style>
    .game-card { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
    .game-info { flex-grow: 1; min-width: 0; }
    .game-moves { color: #666; font-size: 0.8rem; margin-top: 10px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loader { text-align: center; padding: 40px; font-weight: bold; color: var(--accent); }
  </style>
</head>
<body>
  <div class="top-profile-bar">
    <a href="index.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">← НА ГЛАВНУЮ</a>
    <div style="font-weight: bold; color: #fff;">ЛИЧНЫЙ АРХИВ</div>
  </div>

  <div class="hub-container" style="max-width: 800px;">
    <div id="loader" class="loader">Получение партий из облака...</div>
    <main id="archive-list"></main>
  </div>

  <script type="module">
    import { dbol, collection, query, where, getDocs, db } from "./firebase-logic.js";
    // Используем db из твоего экспорта в firebase-logic.js

    async function loadGames() {
        const userId = localStorage.getItem('azachess-user-id');
        const list = document.getElementById('archive-list');
        const loader = document.getElementById('loader');

        if (!userId) {
            list.innerHTML = '<div style="text-align:center; padding: 20px;">Войдите в аккаунт, чтобы просмотреть свои партии.</div>';
            loader.style.display = 'none';
            return;
        }

        try {
            // Упрощенный запрос без сложной сортировки (чтобы не требовать индексы сразу)
            const q = query(collection(db, "games"), where("userId", "==", userId));
            const querySnapshot = await getDocs(q);
            
            loader.style.display = 'none';

            if (querySnapshot.empty) {
                list.innerHTML = '<div style="text-align:center; padding: 20px;">Партий пока нет. Сыграйте свою первую игру!</div>';
                return;
            }

            // Сортируем вручную по ID (времени создания), чтобы не настраивать индексы в Firebase
            const sortedDocs = querySnapshot.docs.sort((a, b) => b.data().id - a.data().id);

            list.innerHTML = sortedDocs.map(doc => {
                const game = doc.data();
                return `
                    <div class="game-card">
                        <div class="game-info">
                            <div style="font-size: 0.75rem; color: #888; text-transform: uppercase;">${game.date} • Уровень ${game.aiLevel}</div>
                            <div style="font-size: 1.1rem; font-weight: bold; color: #fff; margin: 4px 0;">${game.result}</div>
                            <div class="game-moves">${game.history.map(m => m.san).join(' ')}</div>
                        </div>
                        <button class="grid-item" style="padding: 10px 15px; margin-left: 15px;" onclick="viewGame('${doc.id}')">АНАЛИЗ</button>
                    </div>
                `;
            }).join('');

            window.viewGame = (docId) => {
                const doc = sortedDocs.find(d => d.id === docId);
                if (doc) {
                    sessionStorage.setItem('analysis-load-game', JSON.stringify(doc.data().history));
                    window.location.href = 'analysis.html';
                }
            };

        } catch (e) {
            console.error("Firebase Error:", e);
            loader.innerText = "Ошибка загрузки. Проверьте интернет.";
        }
    }

    loadGames();
  </script>
</body>
</html>
